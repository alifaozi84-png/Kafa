<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafa | كافة</title>
  <!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  if (typeof Pi !== "undefined") {

    Pi.init({ version: "2.0" });

    async function authenticate() {
      try {
        const scopes = ['username'];
        const auth = await Pi.authenticate(scopes);
        console.log("Authenticated:", auth);
      } catch (err) {
        console.error("Auth error:", err);
      }
    }

    authenticate();
  }

});
</script>
<style>
:root{
--primary:#1E6091;
--secondary:#FF6B4A;
--bg:#f8fafc;
--soft:#F9F3E6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(145deg,var(--primary),#184D77);
display:flex;
justify-content:center;
padding:20px;
}

.app{
max-width:480px;
width:100%;
background:var(--bg);
border-radius:40px;
overflow:hidden;
box-shadow:0 25px 50px rgba(0,0,0,0.3);
position:relative;
min-height:700px;
}

.header{
background:#fff;
padding:20px;
border-bottom:1px solid #eee;
text-align:center;
color:var(--primary);
font-weight:bold;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.btn{
width:100%;
padding:12px;
background:var(--secondary);
color:#fff;
border:none;
border-radius:30px;
cursor:pointer;
margin-top:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:20px;
margin-bottom:15px;
border:1px solid #eee;
}

.input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

.code-box{
background:var(--soft);
padding:15px;
border-radius:20px;
text-align:center;
margin-top:15px;
}

.footer{
position:absolute;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
كافة ❤️
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">

<div class="card">
<strong id="mealCounter">0</strong> وجبة تم دعمها
</div>

<button class="btn" onclick="goTo('request')">طلب وجبة</button>
<button class="btn" onclick="goTo('donate')">دعم طلب</button>

</div>

<!-- طلب -->
<div id="request" class="page">
<h3>طلب وجبة</h3>

<input type="number" min="1" max="5" id="mealCount" class="input" placeholder="عدد الوجبات (1-5)">

<button class="btn" onclick="createRequest()">إرسال الطلب</button>
<div id="requestStatus"></div>
</div>

<!-- تبرع -->
<div id="donate" class="page">
<h3>الطلبات النشطة</h3>
<div id="requestsList"></div>
</div>

<!-- كود -->
<div id="code" class="page">
<h3>كود الاستلام</h3>
<div id="generatedCode" class="code-box"></div>
<button class="btn" onclick="goTo('home')">العودة للرئيسية</button>
</div>

<div class="footer">
<button onclick="goTo('home')">الرئيسية</button>
<button onclick="goTo('request')">طلب</button>
<button onclick="goTo('donate')">تبرع</button>
</div>

</div>

<script>

function goTo(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
if(page==="donate") loadRequests();
if(page==="home") updateCounter();
}

function createRequest(){
let count=parseInt(document.getElementById("mealCount").value);
if(!count || count<1 || count>5) return;

let requests=JSON.parse(localStorage.getItem("kafa_requests")||"[]");

requests.push({
id:Date.now(),
meals:count,
funded:false
});

localStorage.setItem("kafa_requests",JSON.stringify(requests));
document.getElementById("requestStatus").innerHTML="<div class='card'>تم إرسال الطلب ❤️</div>";
document.getElementById("mealCount").value="";
}

function loadRequests(){
let container=document.getElementById("requestsList");
container.innerHTML="";
let requests=JSON.parse(localStorage.getItem("kafa_requests")||"[]");

requests.filter(r=>!r.funded).forEach(r=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<strong>${r.meals} وجبة</strong>
<button class="btn" onclick="fundRequest(${r.id})">تمويل</button>
`;
container.appendChild(div);
});
}

function fundRequest(id){
let requests=JSON.parse(localStorage.getItem("kafa_requests")||"[]");
let req=requests.find(r=>r.id===id);
if(req.funded) return;

req.funded=true;
localStorage.setItem("kafa_requests",JSON.stringify(requests));
updateCounter();
generateCode();
}

function updateCounter(){
let requests=JSON.parse(localStorage.getItem("kafa_requests")||"[]");
let total=0;
requests.filter(r=>r.funded).forEach(r=> total+=parseInt(r.meals));
document.getElementById("mealCounter").innerText=total;
}

function generateCode(){
let expiry=Date.now()+2*60*60*1000;
let code="KF-"+Math.random().toString(36).substr(2,6).toUpperCase();

localStorage.setItem("kafa_code",JSON.stringify({code,expiry}));

document.getElementById("generatedCode").innerHTML=
"<h2>"+code+"</h2><p>صالح لمدة ساعتين</p>";

goTo("code");
}

updateCounter();

</script>

</body>
</html>
