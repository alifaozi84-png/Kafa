<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafa App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

.header{
text-align:center;
padding:30px 20px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.title{
font-size:32px;
font-weight:bold;
letter-spacing:2px;
}

.subtitle{
color:#aaa;
margin-top:5px;
}

.login-btn{
background:#00b894;
border:none;
padding:14px 25px;
border-radius:10px;
color:white;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

.login-btn:hover{
background:#019875;
}

.cards{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:#1c1c1c;
padding:25px;
border-radius:15px;
text-align:center;
font-size:18px;
}

.card:hover{
background:#262626;
}

.bottom-menu{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #333;
}

.menu-item{
color:#aaa;
font-size:14px;
text-align:center;
}

.menu-item:hover{
color:white;
}

</style>

</head>

<body>

<div class="header">

<img src="https://raw.githubusercontent.com/alifaozi84-png/Kafa/main/logo.png" class="logo">

<div class="title">KAFA</div>
<div class="subtitle">Welcome to the Kafa Application</div>

<button class="login-btn" onclick="login()">Login with Pi</button>

</div>

<div class="cards">

<div class="card">💰 Wallet</div>
<div class="card">👥 Community</div>
<div class="card">🎁 Earn Pi</div>
<div class="card">⚙ Settings</div>

</div>

<div class="bottom-menu">

<div class="menu-item">🏠 Home</div>
<div class="menu-item">💰 Wallet</div>
<div class="menu-item">👥 Community</div>
<div class="menu-item">⚙ Settings</div>

</div>

<script>

Pi.init({ version: "2.0", sandbox: true });

function login(){
Pi.authenticate(["username"], function(auth){
alert("Welcome " + auth.user.username);
});
}

</script>

</body>
</html>
