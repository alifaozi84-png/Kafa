<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kafa App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

.container{
padding:40px;
}

.logo{
width:160px;
margin-bottom:20px;
}

.title{
font-size:40px;
font-weight:bold;
letter-spacing:3px;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

.button{
background:#00b894;
border:none;
padding:15px 30px;
font-size:18px;
color:white;
border-radius:10px;
cursor:pointer;
margin:10px;
}

.button:hover{
background:#019875;
}

.menu{
margin-top:40px;
}

.card{
background:#1c1c1c;
padding:20px;
margin:15px;
border-radius:12px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">KAFA</div>

<div class="subtitle">Welcome to the Kafa Application</div>

<button class="button" onclick="login()">Login with Pi</button>

<div class="menu">

<div class="card">💰 Wallet</div>

<div class="card">👥 Community</div>

<div class="card">⚙ Settings</div>

</div>

</div>

<script>

Pi.init({ version: "2.0", sandbox: true });

function login(){

Pi.authenticate(["username"], function(auth){

alert("Welcome " + auth.user.username);

});

}

</script>

</body>

</html>
